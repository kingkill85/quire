services:
  verso:
    image: ghcr.io/kingkill85/verso:latest
    ports:
      - "3000:3000"
    volumes:
      - verso-data:/data
    environment:
      JWT_SECRET: change-me-run-openssl-rand-hex-32
      DB_DRIVER: sqlite
      DATABASE_URL: file:/data/db.sqlite
      STORAGE_DRIVER: local
      STORAGE_PATH: /data/files
      AUTH_MODE: local
      PORT: 3000
      HOST: 0.0.0.0
      NODE_ENV: production
      MAX_UPLOAD_SIZE: 104857600
      CORS_ORIGIN: http://localhost:3000
    restart: unless-stopped

  quire:
    image: ghcr.io/kingkill85/quire:latest
    ports:
      - "8085:8085"
    environment:
      QUIRE_VERSO_URL: http://verso:3000
      QUIRE_VERSO_APP_PASSWORD_EMAIL: admin@example.com
      QUIRE_VERSO_APP_PASSWORD: change-me
      QUIRE_CF_BYPASS: external
      QUIRE_FLARESOLVERR_URL: http://flaresolverr:8191/v1
    depends_on:
      - verso
    restart: unless-stopped

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      LOG_LEVEL: info
    restart: unless-stopped

volumes:
  verso-data:
